# Runs the test suite on every push/PR to main (GitHub-hosted runner).
# Deploys on the Orange Pi self-hosted runner when tests pass on a push to main.
#
# Required GitHub repository secret (Settings → Secrets → Actions):
#   NEXTAUTH_SECRET  — random 32-char secret for NextAuth session signing
#
# One-time setup on the Orange Pi (see README § Deployment):
#   1. Install and register the GitHub Actions self-hosted runner
#      (Settings → Actions → Runners → New self-hosted runner)
#   2. Add runner labels: self-hosted, linux, arm64
#   3. Ensure the runner OS user is in the `docker` group:
#      sudo usermod -aG docker $USER

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Test (GitHub-hosted) ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test -- --passWithNoTests

  # ── Job 2: Deploy (self-hosted Orange Pi) ───────────────────────────────────
  deploy:
    name: Deploy on Orange Pi
    needs: test
    # Only deploy on direct pushes to main (not on pull requests)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, linux, arm64]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t checkmesa:latest .

      - name: Swap container
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        run: |
          set -euo pipefail

          # Write secrets to a temp file so they are never exposed in ps aux
          printf 'NEXTAUTH_SECRET=%s\nNEXTAUTH_URL=%s\n' \
            "$NEXTAUTH_SECRET" \
            "https://checkmesa.instavel.org" > /tmp/checkmesa.env

          # Ensure the named volume's /data directory is owned by uid/gid 1001
          # (nextjs:nodejs). This is a no-op on a fresh volume but fixes ownership
          # on existing volumes that were previously created as root.
          docker run --rm -v checkmesa-db:/data alpine \
            chown -R 1001:1001 /data

          docker stop checkmesa 2>/dev/null || true
          docker rm   checkmesa 2>/dev/null || true

          docker run -d \
            --name checkmesa \
            --restart unless-stopped \
            -p 3000:3000 \
            -v checkmesa-db:/data \
            -e DATABASE_URL="file:/data/dev.db" \
            --env-file /tmp/checkmesa.env \
            checkmesa:latest

          rm -f /tmp/checkmesa.env

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            sleep 8
            STATUS=$(curl -sf http://localhost:3000/api/health | grep -o '"status":"ok"' || true)
            if [ -n "$STATUS" ]; then
              echo "✓ Health check passed (attempt $i)"
              exit 0
            fi
            echo "  attempt $i — not ready yet"
          done
          echo "✗ Health check failed after 64s"
          docker logs --tail 50 checkmesa || true
          exit 1

