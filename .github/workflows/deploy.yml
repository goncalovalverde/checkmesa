# Runs the test suite on every push/PR to main (GitHub-hosted runner).
# Deploys on the Orange Pi self-hosted runner when tests pass on a push to main.
#
# Required GitHub repository secret (Settings → Secrets → Actions):
#   NEXTAUTH_SECRET  — random 32-char secret for NextAuth session signing
#
# One-time setup on the Orange Pi (see README § Deployment):
#   1. Install and register the GitHub Actions self-hosted runner
#      (Settings → Actions → Runners → New self-hosted runner)
#   2. Add runner labels: self-hosted, linux, arm64
#   3. Ensure the runner OS user is in the `docker` group:
#      sudo usermod -aG docker $USER

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Test (GitHub-hosted) ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test -- --passWithNoTests

  # ── Job 2: Deploy (self-hosted Orange Pi) ───────────────────────────────────
  deploy:
    name: Deploy on Orange Pi
    needs: test
    # Only deploy on direct pushes to main (not on pull requests)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, linux, arm64]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t checkmesa:latest .

      - name: Swap container
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        run: |
          set -euo pipefail

          # Fail immediately if required secrets weren't injected.
          if [ -z "$NEXTAUTH_SECRET" ]; then
            echo "✗ NEXTAUTH_SECRET is empty — add it to GitHub Secrets (Settings → Secrets → Actions)"
            exit 1
          fi
          if [ -z "$NEXTAUTH_URL" ]; then
            echo "✗ NEXTAUTH_URL is empty — add it to GitHub Secrets (Settings → Secrets → Actions)"
            exit 1
          fi

          # Write secrets to a temp file so they are never exposed in ps aux.
          # Trap ensures cleanup even if a later command fails.
          trap 'rm -f /tmp/checkmesa.env' EXIT
          printf 'NEXTAUTH_SECRET=%s\nNEXTAUTH_URL=%s\n' \
            "$NEXTAUTH_SECRET" \
            "$NEXTAUTH_URL" > /tmp/checkmesa.env

          # Ensure the named volume's /data directory is owned by uid/gid 1001
          # (nextjs:nodejs). This is a no-op on a fresh volume but fixes ownership
          # on existing volumes that were previously created as root.
          docker run --rm -v checkmesa-db:/data alpine \
            chown -R 1001:1001 /data

          docker stop checkmesa 2>/dev/null || true
          docker rm   checkmesa 2>/dev/null || true

          docker run -d \
            --name checkmesa \
            --restart unless-stopped \
            -p 3000:3000 \
            -v checkmesa-db:/data \
            -e DATABASE_URL="file:/data/prod.db" \
            --env-file /tmp/checkmesa.env \
            checkmesa:latest

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            sleep 8
            STATUS=$(curl -sf http://localhost:3000/api/health | grep -o '"status":"ok"' || true)
            if [ -n "$STATUS" ]; then
              echo "✓ Health check passed (attempt $i)"
              exit 0
            fi
            echo "  attempt $i — not ready yet"
          done
          echo "✗ Health check failed after 64s"
          docker logs --tail 50 checkmesa || true
          exit 1

      - name: Seed initial data
        env:
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
        run: |
          if [ -z "$SEED_ADMIN_PASSWORD" ]; then
            echo "⚠ Skipping seed — SEED_ADMIN_PASSWORD not set"
            exit 0
          fi

          # Idempotent: only creates the admin user if no users exist yet.
          # Staff users are created by the admin through the application UI.
          # Runs after health check so Prisma client is fully ready.
          docker exec \
            -e SEED_ADMIN_PASSWORD="$SEED_ADMIN_PASSWORD" \
            checkmesa node -e "
              const { PrismaClient } = require('@prisma/client');
              const bcrypt = require('bcryptjs');
              const prisma = new PrismaClient();
              async function run() {
                const count = await prisma.user.count();
                if (count > 0) { console.log('✓ Users already exist — skipping seed'); return; }
                const adminHash = await bcrypt.hash(process.env.SEED_ADMIN_PASSWORD, 12);
                await prisma.user.create({ data: { name: 'Administrador', email: 'admin@checkmesa.pt', password: adminHash, role: 'ADMIN' } });
                console.log('✓ Seed concluído — admin criado');
              }
              run().catch(e => { console.error(e); process.exit(1); }).finally(() => prisma.\$disconnect());
            "

